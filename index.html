/* Parse a prototype inline-style STRING into a React style object.
   Keeps the original design markup nearly verbatim and easy to edit. */
function s(str){
  const o = {};
  if(!str) return o;
  str.split(';').forEach(decl => {
    decl = decl.trim();
    if(!decl) return;
    const i = decl.indexOf(':');
    if(i < 0) return;
    let key = decl.slice(0, i).trim();
    const val = decl.slice(i + 1).trim();
    if(key.startsWith('--')){ o[key] = val; return; }       // CSS custom property
    key = key.replace(/-([a-z])/g, (_, c) => c.toUpperCase()); // kebab -> camel
    o[key] = val;
  });
  return o;
}

class Dashboard extends React.Component {
  constructor(props){
    super(props);

  componentDidMount() {

        const el = reveals[i];

          el.style.transitionDelay = (stagger * 70) + 'ms';
          el.classList.add('in');

      const sc = document.getElementById('scroller');
      if (sc) sc.addEventListener('scroll', this._onScroll, { passive: true });

    const PLOT = 360, AXMAX = 220, px = v => (v / AXMAX) * PLOT;
    const frameworks = {

              <div style={s("font-size:13px;line-height:19px;margin-top:5px;")}>Patch management remains essential. As exploitation increasingly outpaces remediation, current industry frameworks — including NIST CSF 2.0 — place growing weight on detection, containment, and recovery alongside prevention. Control priorities and investment can be reviewed against where protective value now sits.</div>

            <p style={s("font-size:11.5px;line-height:17px;color:var(--fg-3);margin:14px 0 0;padding-top:14px;border-top:1px solid var(--line-1);text-wrap:pretty;")}><strong style={s("color:var(--fg-2);font-weight:700;")}>Based on publicly available information and industry estimates — not internal data from any single institution.</strong> Aligned to NIST CSF 2.0, CISA BOD 26-04 and FFIEC resilience practice. A directional interpretation, not a scored model.<span style={s("display:block;margin-top:6px;")}><strong style={s("font-weight:700;color:var(--fg-2);")}>Sources:</strong> <a href="https://www.nist.gov/cyberframework" target="_blank" rel="noopener" style={s("color:#0069AA;text-decoration:underline;")}>NIST CSF 2.0</a> &middot; <a href="https://www.cisa.gov/news-events/directives/bod-26-04-prioritizing-security-updates-based-risk" target="_blank" rel="noopener" style={s("color:#0069AA;text-decoration:underline;")}>CISA BOD 26-04</a> &middot; <a href="https://ithandbook.ffiec.gov/it-booklets/information-security/ii-information-security-program-management/iia-risk-identification/iia2-vulnerabilities" target="_blank" rel="noopener" style={s("color:#0069AA;text-decoration:underline;")}>FFIEC IT Handbook</a></span></p>

          {/* ============ SECTION 6 · CHANGE FREEZE TRADE-OFF ============ */}
          <div id="ch6" className="reveal" style={s("scroll-margin-top:66px;")}>

              <p style={s("font-size:12.5px;line-height:18px;color:var(--fg-2);margin:7px 0 0;text-wrap:pretty;")}>Pausing change to clear the backlog is one option for reducing exposure. How far to extend it is a judgement of risk reduction versus delivery impact. Choose a scope to see the trade-off.</p>

                      <div><span style={s("font-size:13px;font-weight:700;color:var(--fg-1);")}>{p.h}</span> <span style={s("font-size:12.5px;line-height:18px;color:var(--fg-2);")}>&mdash; {p.t}</span></div>

          </div>

          {/* ============ SECTION 7 · ZERO-VULNERABILITY GATE ============ */}
          <div id="ch7" className="reveal" style={s("scroll-margin-top:66px;")}>
          <section style={s("background:#fff;border:1px solid var(--line-1);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:28px 32px 24px;margin-top:28px;")}>
            <div style={s("max-width:660px;")}>
              <div style={s("font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--pnc-orange);")}>Policy option &middot; zero-vulnerability gate</div>
              <h2 style={s("font-family:var(--font-serif);font-size:21px;font-weight:600;letter-spacing:-.01em;line-height:1.25;margin:8px 0 0;color:var(--fg-1);")}>Weighing a zero-vulnerability gate</h2>
              <p style={s("font-size:12.5px;line-height:18px;color:var(--fg-2);margin:7px 0 0;text-wrap:pretty;")}>Requiring zero open vulnerabilities before any change ships is an understandable goal. Set against a risk-based gate, the trade-off is between eliminating known exposure and keeping delivery moving.</p>

                    <div style={s(`width:${100-g.shipW}%;background:var(--bg-3);`)}></div>

                        <span style={s("font-size:12.5px;line-height:17px;color:var(--fg-1);text-wrap:pretty;")}>{p.t}</span>

            <div style={s("margin-top:16px;padding:14px 16px;background:var(--pnc-navy);border-radius:var(--radius-md);font-size:13px;line-height:19px;color:#fff;")}><strong style={s("color:var(--pnc-orange);")}>The bottom line:</strong> Aiming to fix everything first stops almost all change — and is never actually reached. A risk-based gate keeps the bank moving while fixing the most dangerous flaws first.</div>

            <div style={s("font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-3);margin-top:22px;")}>Why &ldquo;fix everything first&rdquo; can&rsquo;t work</div>

              {gateLimits.map((l, i) => (
                <div key={i} style={s("display:flex;gap:11px;align-items:flex-start;")}>
                  <span style={s("flex:none;width:22px;height:22px;border-radius:50%;background:var(--pnc-orange-050);border:1px solid var(--pnc-orange-100);color:var(--pnc-orange-700);display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:12px;font-weight:700;margin-top:1px;")}>{i + 1}</span>
                  <span style={s("font-size:13px;line-height:19px;color:var(--fg-1);text-wrap:pretty;")}>{l}</span>
                </div>
              ))}
            </div>

            <p style={s("font-size:11.5px;line-height:17px;color:var(--fg-3);margin:16px 0 0;padding-top:14px;border-top:1px solid var(--line-1);text-wrap:pretty;")}><strong style={s("color:var(--fg-2);font-weight:700;")}>Based on publicly available information and industry estimates &mdash; not internal data from any single institution.</strong> The delivery comparison is illustrative of the two gating approaches; the risk-based gate reflects CISA BOD 26-04-style prioritisation. Directional, not a measured figure for any institution.<span style={s("display:block;margin-top:6px;")}><strong style={s("font-weight:700;color:var(--fg-2);")}>Sources:</strong> <a href="https://cloud.google.com/blog/topics/threat-intelligence/2024-zero-day-trends" target="_blank" rel="noopener" style={s("color:#0069AA;text-decoration:underline;")}>GTIG: 2024 Zero-Day Analysis</a> &middot; <a href="https://www.blackduck.com/resources/analyst-reports/open-source-security-risk-analysis.html" target="_blank" rel="noopener" style={s("color:#0069AA;text-decoration:underline;")}>Synopsys / Black Duck OSSRA</a> &middot; <a href="https://www.cisa.gov/news-events/directives/bod-26-04-prioritizing-security-updates-based-risk" target="_blank" rel="noopener" style={s("color:#0069AA;text-decoration:underline;")}>CISA BOD 26-04</a></span></p>
          </section>

          {this.groupHeader('grp3',3,'IV','Part four','Governing Internal AI','Beyond AI as a threat, the institution\'s own AI use is a distinct control domain. As adoption grows, the models, agents, and data pipelines it runs extend model risk management and security beyond traditional software.',40)}

          {/* ============ PART IV · INTERNAL AI MODEL CONTROL ============ */}
          <div id="ch9" className="reveal" style={s("scroll-margin-top:66px;margin-top:28px;")}>
          <section style={s("background:#fff;border:1px solid var(--line-1);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:28px 32px 24px;")}>
            <div style={s("max-width:710px;")}>
              <div style={s("font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--pnc-orange);")}>Internal AI &middot; frontier models &amp; autonomous agents</div>
              <h2 style={s("font-family:var(--font-serif);font-size:21px;font-weight:600;letter-spacing:-.01em;line-height:1.25;margin:8px 0 0;color:var(--fg-1);")}>Governing frontier models and agents</h2>
              <p style={s("font-size:12.5px;line-height:18px;color:var(--fg-2);margin:7px 0 0;text-wrap:pretty;")}>Generative AI used to mean reviewing what a model wrote. As the most capable frontier models — and the autonomous agents built on them — are brought inside the bank, directly or through third parties, the risk shifts from content to action: they can <em style={s("font-style:normal;font-weight:700;color:var(--fg-1);")}>do</em> things. The controls that matter shift with it.</p>

            <div style={s("font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-3);margin-top:18px;margin-bottom:9px;")}>Why frontier models change the risk — beyond older generative AI</div>
            <div style={s("display:grid;grid-template-columns:repeat(3,1fr);gap:10px;")} data-collapse="">
              {aiShift.map((sh, i) => (

            </div>

            <div style={s("font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-3);margin-top:18px;margin-bottom:9px;")}>Controls that become essential</div>
            <div style={s("display:grid;grid-template-columns:1fr 1fr;gap:10px;")} data-collapse="">
              {aiControls.map((c, i) => (

                  <div style={s("font-size:13px;font-weight:700;color:var(--fg-1);")}>{c.name}</div>
                  <div style={s("font-size:11.5px;line-height:16px;color:var(--fg-2);margin-top:4px;text-wrap:pretty;")}>{c.desc}</div>
                  <div style={s("font-size:11px;line-height:15px;color:var(--fg-3);margin-top:6px;")}><span style={s("font-weight:700;")}>Measure &middot; </span>{c.metric}</div>
                </div>
              ))}
            </div>

            <div style={s("font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-3);margin-top:18px;margin-bottom:9px;")}>Grounded in established governance frameworks</div>
            <div style={s("display:grid;grid-template-columns:repeat(4,1fr);gap:10px;")} data-collapse="">
              {aiFrameworks.map((f, i) => (
                <div key={i} style={s("border:1px solid var(--line-1);border-radius:var(--radius-md);padding:11px 13px;background:var(--bg-2);")}>
                  <div style={s("font-size:12.5px;font-weight:700;color:var(--fg-1);")}>{f.name}</div>
                  <div style={s("font-size:11px;line-height:15px;color:var(--fg-3);margin-top:4px;text-wrap:pretty;")}>{f.detail}</div>
                </div>
              ))}
            </div>

            <div style={s("margin-top:18px;padding:15px 18px;background:var(--pnc-navy);border-radius:var(--radius-md);color:#fff;")}>
              <div style={s("font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--pnc-orange);")}>What it means for the board</div>
              <div style={s("font-size:13px;line-height:19px;margin-top:5px;")}>Older generative AI was largely a content risk. Frontier models and autonomous agents are an action risk — they can take consequential steps on their own. The emphasis shifts from reviewing outputs to observing behaviour, bounding autonomy, and being able to intervene: observability, kill switches, and containment, not policy alone.</div>
            </div>
            <p style={s("font-size:11.5px;line-height:17px;color:var(--fg-3);margin:14px 0 0;padding-top:14px;border-top:1px solid var(--line-1);text-wrap:pretty;")}><strong style={s("color:var(--fg-2);font-weight:700;")}>Based on publicly available standards and guidance — not internal data from any single institution.</strong> Control set aligned to the frameworks above; a directional interpretation, not a scored model.<span style={s("display:block;margin-top:6px;")}><strong style={s("font-weight:700;color:var(--fg-2);")}>Sources:</strong> <a href="https://www.nist.gov/itl/ai-risk-management-framework" target="_blank" rel="noopener" style={s("color:#0069AA;text-decoration:underline;")}>NIST AI RMF</a> &middot; <a href="https://www.iso.org/standard/81230.html" target="_blank" rel="noopener" style={s("color:#0069AA;text-decoration:underline;")}>ISO/IEC 42001</a> &middot; <a href="https://eur-lex.europa.eu/eli/reg/2024/1689/oj/eng" target="_blank" rel="noopener" style={s("color:#0069AA;text-decoration:underline;")}>EU AI Act</a> &middot; <a href="https://www.federalreserve.gov/supervisionreg/srletters/SR2602.htm" target="_blank" rel="noopener" style={s("color:#0069AA;text-decoration:underline;")}>Fed SR 26-2 (model risk)</a> &middot; <a href="https://genai.owasp.org/llm-top-10/" target="_blank" rel="noopener" style={s("color:#0069AA;text-decoration:underline;")}>OWASP LLM Top 10</a></span></p>
          </section>

                  <div style={s("font-size:12px;line-height:17px;color:var(--fg-3);margin-top:11px;padding-top:11px;border-top:1px solid var(--line-1);text-wrap:pretty;")}>{q.why}</div>
                </div>

            </div>
            <p style={s("font-size:9.5px;line-height:13.5px;color:var(--fg-3);margin:16px 0 0;padding-top:11px;border-top:1px solid var(--line-1);")}><strong style={s("color:var(--fg-2);font-weight:700;")}>Based on publicly available information and industry estimates — not internal data from any single institution.</strong></p>
          </section>
          </div>

          <div className="no-print" style={s("display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:26px;padding-top:18px;border-top:1px solid var(--line-1);flex-wrap:wrap;")}>
            <button onClick={onPrev} style={s(`display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-family:var(--font-sans);font-size:13px;font-weight:600;padding:9px 16px;border-radius:var(--radius-md);background:#fff;border:1px solid var(--line-1);color:var(--fg-2);opacity:${prevOpacity};`)}>{prevText}</button>
            <span style={s("font-size:11px;font-weight:600;color:var(--fg-3);")}>{stepLabel}</span>
            <button onClick={onNext} style={s(`display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-family:var(--font-sans);font-size:13px;font-weight:700;padding:9px 16px;border-radius:var(--radius-md);background:var(--pnc-navy);border:none;color:#fff;opacity:${nextOpacity};`)}>{nextText}</button>
          </div>

        </main>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard showTargets={true} />);
</script>
</body>
</html>
